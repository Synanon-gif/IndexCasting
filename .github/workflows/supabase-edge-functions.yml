# Auto-deploy Supabase Edge Functions when function code changes on main.
# SQL migrations are NOT applied here (use Dashboard, CLI, or Management API with review).
name: Supabase Edge Functions

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
      - 'scripts/deploy-supabase-functions.sh'
  workflow_dispatch: {}

concurrency:
  group: supabase-functions-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy Edge Functions
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies (Supabase CLI via npx)
        run: npm ci

      - name: Deploy all functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: bash scripts/deploy-supabase-functions.sh
