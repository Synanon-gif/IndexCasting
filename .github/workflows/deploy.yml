name: Deploy to Production

on:
  push:
    branches: [main]

# Verhindert parallele Deploys auf denselben Branch
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  quality:
    name: Quality Gate (Type check, lint & test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check (non-blocking)
        run: npm run typecheck || echo "::warning::TypeScript errors found – not blocking deploy"

      - name: Lint (non-blocking)
        run: npm run lint || echo "::warning::Lint errors found – not blocking deploy"

      - name: Tests
        run: npm test -- --passWithNoTests --ci
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}

  deploy:
    name: Deploy to Vercel (Production)
    runs-on: ubuntu-latest
    needs: quality
    environment:
      name: production
      url: https://index-casting.com
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
          working-directory: ./
